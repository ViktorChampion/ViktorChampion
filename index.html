<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная таблица</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --primary: #334155;
            --bg: #f1f5f9;
            --cell-size: 45px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        h1 { color: var(--primary); margin-bottom: 20px; }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 12px;
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
            background: transparent;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .control-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }

        input[type=range] { appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; border: 2px solid white; }

        #game-status {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ef4444;
            min-height: 1.6rem;
            line-height: 1.4;
        }

        .table-container { overflow: auto; max-width: 95vw; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        table { border-collapse: collapse; table-layout: fixed; }
        td, th {
            border: 1px solid rgba(0,0,0,0.05);
            width: var(--cell-size);
            height: var(--cell-size);
            text-align: center;
            font-size: 0.85rem;
            box-sizing: border-box;
            cursor: pointer;
        }

        th, .row-head { background: var(--primary); color: white; font-weight: bold; }

        .hl-line { outline: 2px solid #000; outline-offset: -2px; z-index: 5; position: relative; }
        .hidden-cell { color: transparent !important; }
        .wrong { background: #fecaca !important; animation: shake 0.2s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <h1>Интерактивная таблица</h1>

    <div class="mode-selector">
        <button id="btn-study" class="mode-btn active" onclick="changeMode('study')">Таблица</button>
        <button id="btn-test" class="mode-btn" onclick="changeMode('test')">Проверка знаний</button>
        <button id="btn-sprint" class="mode-btn" onclick="changeMode('sprint')">Спринт</button>
    </div>

    <div class="controls">
        <div id="game-status"></div>
        <div class="control-group">
            <label>Размер: <span id="sizeVal">10</span></label>
            <input type="range" id="sizeRange" min="2" max="15" value="10">
        </div>
        <div class="control-group">
            <label>Операция: <span id="opVal">×</span></label>
            <input type="range" id="opRange" min="0" max="3" value="0" step="1">
        </div>
    </div>

    <div class="table-container">
        <table id="pithTable"></table>
    </div>

    <script>
        const table = document.getElementById('pithTable');
        const status = document.getElementById('game-status');
        const sizeRange = document.getElementById('sizeRange');
        const opRange = document.getElementById('opRange');
        
        let mode = 'study';
        let targetValue = null;
        let score = 0;
        let timer = null;
        let timeLeft = 60;

        const ops = [
            { sign: '×', fn: (a, b) => a * b },
            { sign: '+', fn: (a, b) => a + b },
            { sign: '-', fn: (a, b) => a - b },
            { sign: '÷', fn: (a, b) => (a / b).toFixed(2) }
        ];

        function changeMode(newMode) {
            mode = newMode;
            clearInterval(timer);
            status.innerHTML = '';
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + newMode).classList.add('active');
            if (mode === 'sprint') startSprint();
            update();
        }

        function getColor(i, j, size) {
            const ratio = (i + j - 2) / (size * 2 - 2);
            return `hsl(${ratio * 200}, 80%, 85%)`;
        }

        function update() {
            const size = parseInt(sizeRange.value);
            const opIdx = parseInt(opRange.value);
            document.getElementById('sizeVal').innerText = size;
            document.getElementById('opVal').innerText = ops[opIdx].sign;

            let html = `<thead><tr><th>${ops[opIdx].sign}</th>`;
            for (let i = 1; i <= size; i++) html += `<th>${i}</th>`;
            html += '</tr></thead><tbody>';

            for (let i = 1; i <= size; i++) {
                html += `<tr><td class="row-head">${i}</td>`;
                for (let j = 1; j <= size; j++) {
                    let res = ops[opIdx].fn(i, j);
                    if (opIdx === 3) res = parseFloat(res);
                    const isHidden = (mode === 'test' || mode === 'sprint');
                    html += `<td data-row="${i}" data-col="${j}" data-res="${res}" 
                                class="${isHidden ? 'hidden-cell' : ''}" 
                                style="background-color: ${getColor(i, j, size)}">${res}</td>`;
                }
                html += '</tr>';
            }
            table.innerHTML = html + '</tbody>';
        }

        table.addEventListener('click', (e) => {
            const cell = e.target;
            if (!cell.dataset.res) return;

            if (mode === 'study') {
                document.querySelectorAll('.hl-line').forEach(el => el.classList.remove('hl-line'));
                table.querySelectorAll(`[data-row="${cell.dataset.row}"]`).forEach(el => el.classList.add('hl-line'));
                table.querySelectorAll(`[data-col="${cell.dataset.col}"]`).forEach(el => el.classList.add('hl-line'));
            } 
            else if (mode === 'test') {
                const guess = prompt(`${cell.dataset.row} ${ops[opRange.value].sign} ${cell.dataset.col} = ?`);
                if (guess == cell.dataset.res) {
                    cell.classList.remove('hidden-cell');
                } else if (guess !== null) {
                    cell.classList.add('wrong');
                    setTimeout(() => cell.classList.remove('wrong'), 400);
                }
            }
            else if (mode === 'sprint') {
                // ПРОВЕРКА: совпадает ли результат кликнутой клетки с целью
                if (cell.dataset.res == targetValue) {
                    score++;
                    nextSprint();
                } else {
                    cell.classList.add('wrong');
                    setTimeout(() => cell.classList.remove('wrong'), 400);
                }
            }
        });

        function startSprint() {
            score = 0;
            timeLeft = 60;
            nextSprint();
            timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert("Время вышло! Твой счёт: " + score);
                    changeMode('study');
                } else {
                    showSprintUI();
                }
            }, 1000);
        }

        function nextSprint() {
            const size = parseInt(sizeRange.value);
            // Генерируем случайные координаты, чтобы получить существующее в таблице число
            const r = Math.floor(Math.random() * size) + 1;
            const c = Math.floor(Math.random() * size) + 1;
            let res = ops[opRange.value].fn(r, c);
            targetValue = (opRange.value == 3 ? parseFloat(res) : res);
            showSprintUI();
        }

        function showSprintUI() {
            status.innerHTML = `⏱ ${timeLeft}с | ⭐ Счёт: ${score}<br>Найди клетку с ответом: <span style="font-size: 1.5rem; color: #334155;">${targetValue}</span>`;
        }

        sizeRange.oninput = update;
        opRange.oninput = update;
        update();
    </script>
</body>
</html>
