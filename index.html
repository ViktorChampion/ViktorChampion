<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренажер Виктора: Столбики</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --primary: #334155;
            --bg: #f1f5f9;
            --cell-size: 45px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        .main-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
        }

        .control-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }

        input[type=range] { appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .table-container { overflow: auto; background: white; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); padding: 5px; }
        
        table { border-collapse: collapse; table-layout: fixed; }
        td, th {
            border: 1px solid rgba(0,0,0,0.05);
            width: var(--cell-size);
            height: var(--cell-size);
            text-align: center;
            font-size: 0.85rem;
            box-sizing: border-box;
            cursor: pointer;
        }

        th, .row-head { background: var(--primary); color: white; font-weight: bold; }

        .hl-line { outline: 2px solid #000; outline-offset: -2px; }
        .hl-main { background: white !important; color: black !important; font-weight: bold; box-shadow: 0 0 15px rgba(0,0,0,0.3); transform: scale(1.05); position: relative; z-index: 5; }
        
        /* Стили для СТОЛБИКА */
        .sidebar {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-width: 200px;
            border-left: 5px solid var(--primary);
        }

        .calc-title { color: #64748b; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; font-weight: bold; }

        .math-column {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.6rem;
            line-height: 1.2;
            text-align: right;
            display: inline-block;
        }

        .line { border-top: 3px solid #334155; margin-top: 5px; margin-bottom: 5px; }
        .op-sign { float: left; margin-right: 10px; }
        .partial { color: #64748b; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>Размер: <span id="sizeVal">10</span></label>
            <input type="range" id="sizeRange" min="2" max="15" value="10">
        </div>
        <div class="control-group">
            <label>Операция: <span id="opVal">×</span></label>
            <input type="range" id="opRange" min="0" max="3" value="0" step="1">
        </div>
    </div>

    <div class="main-layout">
        <div class="table-container">
            <table id="pithTable"></table>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="calc-title">Решение столбиком</div>
            <div id="columnResult" class="math-column">Нажми на ячейку</div>
        </div>
    </div>

    <script>
        const table = document.getElementById('pithTable');
        const colRes = document.getElementById('columnResult');
        const sizeRange = document.getElementById('sizeRange');
        const opRange = document.getElementById('opRange');
        
        const ops = [
            { sign: '×', name: 'Умножение', fn: (a, b) => a * b },
            { sign: '+', name: 'Сложение', fn: (a, b) => a + b },
            { sign: '-', name: 'Вычитание', fn: (a, b) => a - b },
            { sign: '÷', name: 'Деление', fn: (a, b) => (a / b).toFixed(2) }
        ];

        let lastClicked = null;

        function getColor(i, j, size) {
            const ratio = (i + j - 2) / (size * 2 - 2);
            return `hsl(${ratio * 200}, 80%, 85%)`;
        }

        function update() {
            const size = parseInt(sizeRange.value);
            const opIdx = parseInt(opRange.value);
            const currentOp = ops[opIdx];
            
            document.getElementById('sizeVal').innerText = size;
            document.getElementById('opVal').innerText = currentOp.sign;
            colRes.innerHTML = "Выбери ячейку";

            let html = `<thead><tr><th data-type="corner">${currentOp.sign}</th>`;
            for (let i = 1; i <= size; i++) html += `<th data-type="col-head" data-col="${i}">${i}</th>`;
            html += '</tr></thead><tbody>';

            for (let i = 1; i <= size; i++) {
                html += `<tr><td class="row-head" data-type="row-head" data-row="${i}">${i}</td>`;
                for (let j = 1; j <= size; j++) {
                    let res = currentOp.fn(i, j);
                    if (opIdx === 3) res = parseFloat(res);
                    html += `<td data-type="cell" data-row="${i}" data-col="${j}" data-res="${res}" style="background-color: ${getColor(i, j, size)}">${res}</td>`;
                }
                html += '</tr>';
            }
            table.innerHTML = html + '</tbody>';
            lastClicked = null;
        }

        function renderColumn(a, b, opIdx) {
            const op = ops[opIdx];
            const res = op.fn(a, b);

            if (opIdx === 1 || opIdx === 2) { // Сложение и Вычитание
                colRes.innerHTML = `
                    <div>&nbsp;${a}</div>
                    <div><span class="op-sign">${op.sign}</span>${b}</div>
                    <div class="line"></div>
                    <div>${res}</div>
                `;
            } 
            else if (opIdx === 0) { // Умножение
                let html = `<div>&nbsp;${a}</div><div><span class="op-sign">×</span>${b}</div><div class="line"></div>`;
                const bStr = b.toString();
                if (bStr.length > 1) {
                    const p1 = a * parseInt(bStr[1]);
                    const p2 = a * parseInt(bStr[0]);
                    html += `<div class="partial">${p1}</div>`;
                    html += `<div class="partial">+${p2}0</div>`;
                    html += `<div class="line"></div>`;
                }
                html += `<div>${res}</div>`;
                colRes.innerHTML = html;
            }
            else if (opIdx === 3) { // Деление (Уголок)
                colRes.innerHTML = `
                    <div style="text-align: left;">
                        ${a} | <span style="border-bottom: 2px solid #000">${b}</span><br>
                        &nbsp;&nbsp; | ${parseFloat(res)}
                    </div>
                `;
            }
        }

        table.addEventListener('click', (e) => {
            const target = e.target;
            if (target.dataset.type !== 'cell') return;

            if (lastClicked === target) {
                clearHighlight();
                colRes.innerHTML = "Нажми на клетку";
                lastClicked = null;
                return;
            }

            clearHighlight();
            lastClicked = target;
            const r = target.dataset.row;
            const c = target.dataset.col;
            
            target.classList.add('hl-main');
            table.querySelectorAll(`[data-row="${r}"]`).forEach(el => el.classList.add('hl-line'));
            table.querySelectorAll(`[data-col="${c}"]`).forEach(el => el.classList.add('hl-line'));

            renderColumn(parseInt(r), parseInt(c), opRange.value);
        });

        function clearHighlight() {
            table.querySelectorAll('.hl-line, .hl-main').forEach(el => el.classList.remove('hl-line', 'hl-main'));
        }

        sizeRange.oninput = update;
        opRange.oninput = update;
        update();
    </script>
</body>
</html>
