<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная таблица</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --primary: #334155;
            --bg: #f1f5f9;
            --cell-size: 45px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }

        /* Переключатель режимов */
        .mode-selector {
            display: flex;
            gap: 5px;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            color: #64748b;
            background: transparent;
        }

        .mode-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .control-group { margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 0.7rem; color: #64748b; text-transform: uppercase; }

        input[type=range] { appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; border: 2px solid white; }

        /* Игровые элементы */
        #game-info { font-size: 1.2rem; font-weight: bold; color: #ef4444; margin-bottom: 10px; min-height: 1.5rem; }

        .table-container { overflow: auto; max-width: 98vw; padding: 10px; background: white; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        table { border-collapse: collapse; table-layout: fixed; }
        td, th {
            border: 1px solid rgba(0,0,0,0.05);
            width: var(--cell-size);
            height: var(--cell-size);
            text-align: center;
            font-size: 0.85rem;
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
        }

        th, .row-head { background: var(--primary); color: white; font-weight: bold; }

        .hl-line { outline: 2px solid #000; outline-offset: -2px; z-index: 5; }
        .hidden-val { color: transparent !important; background: white !important; }
        .wrong { background: #fee2e2 !important; animation: shake 0.2s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <h1>Интерактивная таблица</h1>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('study')">Таблица</button>
        <button class="mode-btn" onclick="setMode('test')">Проверка</button>
        <button class="mode-btn" onclick="setMode('sprint')">Спринт</button>
    </div>

    <div class="controls">
        <div id="game-info"></div>
        <div class="control-group">
            <label>Размер: <span id="sizeVal">10</span></label>
            <input type="range" id="sizeRange" min="2" max="15" value="10">
        </div>
        <div class="control-group">
            <label>Операция: <span id="opVal">×</span></label>
            <input type="range" id="opRange" min="0" max="3" value="0" step="1">
        </div>
    </div>

    <div class="table-container">
        <table id="pithTable"></table>
    </div>

    <script>
        const table = document.getElementById('pithTable');
        const info = document.getElementById('game-info');
        const sizeRange = document.getElementById('sizeRange');
        const opRange = document.getElementById('opRange');
        
        let currentMode = 'study';
        let sprintTask = null;
        let timeLeft = 60;
        let timer = null;
        let score = 0;

        const ops = [
            { sign: '×', fn: (a, b) => a * b },
            { sign: '+', fn: (a, b) => a + b },
            { sign: '-', fn: (a, b) => a - b },
            { sign: '÷', fn: (a, b) => (a / b).toFixed(2) }
        ];

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(mode === 'study' ? 'табл' : mode === 'test' ? 'пров' : 'спр')));
            clearInterval(timer);
            info.innerText = '';
            if(mode === 'sprint') startSprint();
            update();
        }

        function getColor(i, j, size) {
            const ratio = (i + j - 2) / (size * 2 - 2);
            return `hsl(${ratio * 200}, 80%, 85%)`;
        }

        function update() {
            const size = parseInt(sizeRange.value);
            const opIdx = parseInt(opRange.value);
            document.getElementById('sizeVal').innerText = size;
            document.getElementById('opVal').innerText = ops[opIdx].sign;

            let html = `<thead><tr><th>${ops[opIdx].sign}</th>`;
            for (let i = 1; i <= size; i++) html += `<th>${i}</th>`;
            html += '</tr></thead><tbody>';

            for (let i = 1; i <= size; i++) {
                html += `<tr><td class="row-head">${i}</td>`;
                for (let j = 1; j <= size; j++) {
                    let res = ops[opIdx].fn(i, j);
                    if (opIdx === 3) res = parseFloat(res);
                    const isHidden = (currentMode === 'test' || currentMode === 'sprint');
                    html += `<td data-row="${i}" data-col="${j}" data-res="${res}" 
                                class="${isHidden ? 'hidden-val' : ''}" 
                                style="background-color: ${getColor(i, j, size)}">${res}</td>`;
                }
                html += '</tr>';
            }
            table.innerHTML = html + '</tbody>';
        }

        table.addEventListener('click', (e) => {
            const target = e.target;
            if (!target.dataset.res) return;

            if (currentMode === 'study') {
                document.querySelectorAll('.hl-line').forEach(el => el.classList.remove('hl-line'));
                table.querySelectorAll(`[data-row="${target.dataset.row}"]`).forEach(el => el.classList.add('hl-line'));
                table.querySelectorAll(`[data-col="${target.dataset.col}"]`).forEach(el => el.classList.add('hl-line'));
            } 
            else if (currentMode === 'test') {
                const answer = prompt(`Сколько будет ${target.dataset.row} ${ops[opRange.value].sign} ${target.dataset.col}?`);
                if (answer == target.dataset.res) {
                    target.classList.remove('hidden-val');
                } else if (answer !== null) {
                    target.classList.add('wrong');
                    setTimeout(() => target.classList.remove('wrong'), 500);
                }
            }
            else if (currentMode === 'sprint') {
                if (target.dataset.res == sprintTask.res && target.dataset.row == sprintTask.r && target.dataset.col == sprintTask.c) {
                    score++;
                    newSprintTask();
                } else {
                    target.classList.add('wrong');
                    setTimeout(() => target.classList.remove('wrong'), 500);
                }
            }
        });

        function startSprint() {
            score = 0;
            timeLeft = 60;
            newSprintTask();
            timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert(`Время вышло! Твой результат: ${score}`);
                    setMode('study');
                } else {
                    renderSprintInfo();
                }
            }, 1000);
        }

        function newSprintTask() {
            const size = parseInt(sizeRange.value);
            const r = Math.floor(Math.random() * size) + 1;
            const c = Math.floor(Math.random() * size) + 1;
            const res = ops[opRange.value].fn(r, c);
            sprintTask = { r, c, res: (opRange.value == 3 ? parseFloat(res) : res) };
            renderSprintInfo();
        }

        function renderSprintInfo() {
            info.innerHTML = `⏱ ${timeLeft} сек | ⭐ Счёт: ${score} <br> Найди: ${sprintTask.r} ${ops[opRange.value].sign} ${sprintTask.c}`;
        }

        sizeRange.oninput = update;
        opRange.oninput = update;
        update();
    </script>
</body>
</html>
